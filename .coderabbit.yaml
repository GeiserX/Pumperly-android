language: "en-US"
tone_instructions: "Be direct and concise. No fluff."

reviews:
  profile: "chill"
  high_level_summary: true
  collapse_walkthrough: true
  poem: false
  sequence_diagrams: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
  path_filters:
    - "!build/**"
    - "!.gradle/**"
    - "!**/*.apk"
    - "!**/*.aab"
    - "!**/gradle-wrapper.jar"
  path_instructions:
    - path: "app/src/main/java/**"
      instructions: |
        Focus on WebView security: proper URL validation, JavaScript interface safety.
        Verify input validation and sanitization on all user-supplied data.
        Check for proper error handling — never leak internal details.
    - path: "app/src/main/AndroidManifest.xml"
      instructions: |
        Verify permissions are minimal and justified.
        Check exported components are intentional.
    - path: "*.gradle*"
      instructions: |
        Check dependency versions are pinned, not dynamic (+).
        Verify minSdk and targetSdk are appropriate.
  tools:
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "CLAUDE.md"
