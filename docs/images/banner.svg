<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Phone icon -->
  <g transform="translate(75, 45)">
    <rect x="0" y="0" width="50" height="90" rx="8" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <rect x="6" y="12" width="38" height="60" rx="2" fill="#ffffff" opacity="0.15"/>
    <circle cx="25" cy="82" r="4" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <!-- Fuel pump icon -->
    <rect x="16" y="24" width="14" height="20" rx="2" fill="#ffffff" opacity="0.4"/>
    <rect x="20" y="20" width="6" height="6" rx="1" fill="#ffffff" opacity="0.3"/>
    <line x1="30" y1="28" x2="34" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="28" x2="34" y2="40" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <text x="180" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Pumperly Android
  </text>

  <text x="182" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Native Android app for fuel and EV route planning
  </text>

  <g transform="translate(770, 40)" opacity="0.15">
    <line x1="15" y1="10" x2="15" y2="120" stroke="#ffffff" stroke-width="2"/>
    <circle cx="15" cy="10" r="6" fill="#22c55e" stroke="#ffffff" stroke-width="2"/>
    <text x="30" y="14" font-family="monospace" font-size="10" fill="#ffffff">1.459/L</text>
    <circle cx="15" cy="45" r="5" fill="#eab308" stroke="#ffffff" stroke-width="2"/>
    <text x="30" y="49" font-family="monospace" font-size="10" fill="#ffffff">1.512/L</text>
    <circle cx="15" cy="80" r="5" fill="#22c55e" stroke="#ffffff" stroke-width="2"/>
    <text x="30" y="84" font-family="monospace" font-size="10" fill="#ffffff">1.389/L</text>
    <circle cx="15" cy="115" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
    <text x="30" y="119" font-family="monospace" font-size="10" fill="#ffffff">1.621/L</text>
  </g>
</svg>
